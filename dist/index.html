<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#f8fafc" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>TutuType — 手绘路径文本排版工具</title>
    <meta name="description" content="TutuType：沿手绘路径排布文字的创意排版工具" />
    <script>
    var _hmt = _hmt || [];
    (function() {
      var hm = document.createElement("script");
      hm.src = "https://hm.baidu.com/hm.js?f03c0ae2e87e01fe2796bbedddd77585";
      var s = document.getElementsByTagName("script")[0]; 
      s.parentNode.insertBefore(hm, s);
    })();
    </script>
    <script type="module" crossorigin src="/assets/index-DtIEIclh.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-BbRlWVVC.css">
  </head>
  <body>
    <!-- 弥散光背景层 -->
    <div class="bg-blobs" aria-hidden="true">
      <div class="blob blob-purple"></div>
      <div class="blob blob-blue"></div>
    </div>
    
    <script>
      window.onerror = function (msg, url, lineNo, columnNo, error) {
        var string = msg.toLowerCase();
        var substring = "script error";
        if (string.indexOf(substring) > -1){
          alert('Script Error: See Browser Console for Detail');
        } else {
          var message = [
            'Message: ' + msg,
            'URL: ' + url,
            'Line: ' + lineNo,
            'Column: ' + columnNo,
            'Error object: ' + JSON.stringify(error)
          ].join(' - ');
          alert(message);
        }
        return false;
      };
      window.addEventListener("unhandledrejection", function (event) {
        alert("Unhandled Promise Rejection: " + event.reason);
      });
    </script>

    <div class="app-shell">
      <aside class="sidebar-container" aria-label="操作控制台">
        <!-- 品牌标题 -->
        <div class="brand-header">
          <h1 class="panel-title">TutuType</h1>
          <p class="panel-subtitle">手绘路径文本排版工具</p>
        </div>

        <input id="image-input" class="visually-hidden" type="file" accept="image/*" />
        <div id="left-panel-root"></div>

        <!-- 底部署名 -->
        <footer class="panel-footer">
          design by：小红书@暴躁兔老师
        </footer>
      </aside>

      <main class="canvas-stage" aria-label="核心画布区">
        <div class="stage-frame">
          <div class="stage-toolbar" style="display: none;">
            <button class="toolbar-export-button" data-action="export-right" type="button">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
              导出图片
            </button>
          </div>
          <img id="stage-image" class="stage-image" alt="上传后的底图" />
          <svg
            id="draw-overlay"
            class="draw-overlay"
            xmlns="http://www.w3.org/2000/svg"
            aria-label="手绘轨迹蒙层"
          ></svg>
          <div id="stage-placeholder" class="stage-placeholder">
            <div class="empty-state-container" id="empty-state-trigger">
              <div class="empty-state-button">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
              </div>
              <p class="empty-state-text">上传图片开始创作</p>
            </div>
          </div>
          <!-- 右下角：撤销/重做 -->
          <div class="stage-toolbar-bottom" aria-label="历史操作">
            <button class="toolbar-icon-button" data-action="undo" type="button" title="撤销" aria-label="撤销">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7v6h6"></path><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"></path></svg>
            </button>
            <button class="toolbar-icon-button" data-action="redo" type="button" title="重做" aria-label="重做">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 7v6h-6"></path><path d="M3 17a9 9 0 0 1 9-9 9 9 0 0 1 6 2.3l3 2.7"></path></svg>
            </button>
          </div>
        </div>
      </main>
    </div>

  </body>
</html>
